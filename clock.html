<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Live Time Display</title>
    <meta name="robots" content="index, follow">
    <meta name="description"
        content="Beautiful full-screen digital clock with real-time updates. Shows current time with hours, minutes, and seconds.">
    <link rel="canonical" href="https://viveknimbolkar.github.io/textutils/clock.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'SF Mono', 'Monaco', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .clock-container {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .clock-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(4rem, 20vw, 16rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(99, 102, 241, 0.5);
            line-height: 1;
        }

        .time-separator {
            animation: blink 1s ease-in-out infinite;
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .seconds {
            font-size: clamp(2rem, 8vw, 6rem);
            background: linear-gradient(180deg, #818cf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date-display {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2rem;
        }

        .am-pm {
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: #6366f1;
            font-weight: 600;
            margin-left: 1rem;
            vertical-align: super;
        }

        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .glow-orb-1 {
            background: #6366f1;
            top: 10%;
            left: 10%;
        }

        .glow-orb-2 {
            background: #8b5cf6;
            bottom: 10%;
            right: 10%;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            color: #94a3b8;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            color: #94a3b8;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .timezone {
            font-size: 0.875rem;
            color: #475569;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="clock-container">
        <!-- Animated background orbs -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- Back button -->
        <a href="./" class="back-btn">← Back to Home</a>

        <!-- Main clock display -->
        <div class="text-center relative z-10">
            <div class="time-display">
                <span id="hours">00</span><span class="time-separator">:</span><span id="minutes">00</span><span
                    class="seconds"><span class="time-separator">:</span><span id="seconds">00</span></span>
            </div>
            <div class="date-display">
                <span id="date-text">Loading...</span>
            </div>
            <div class="timezone">
                <span id="timezone"></span>
            </div>
        </div>

        <!-- Fullscreen button -->
        <button class="fullscreen-btn" id="fullscreen-btn">
            ⛶ Fullscreen
        </button>
    </div>

    <script>
        // Clock functionality
        function updateClock() {
            const now = new Date();

            // Get time components
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // Format with leading zeros
            const hoursStr = hours.toString().padStart(2, '0');
            const minutesStr = minutes.toString().padStart(2, '0');
            const secondsStr = seconds.toString().padStart(2, '0');

            // Update time display
            document.getElementById('hours').textContent = hoursStr;
            document.getElementById('minutes').textContent = minutesStr;
            document.getElementById('seconds').textContent = secondsStr;

            // Format date
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const dateStr = now.toLocaleDateString('en-US', options);
            document.getElementById('date-text').textContent = dateStr;

            // Show timezone
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('timezone').textContent = timezone;
        }

        // Fullscreen functionality
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Update fullscreen button text based on state
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreen-btn');
            if (document.fullscreenElement) {
                btn.textContent = '⛶ Exit Fullscreen';
            } else {
                btn.textContent = '⛶ Fullscreen';
            }
        });

        // Initialize and update every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
